default: &default
  adapter: postgresql
  encoding: unicode
  host:     <%= ENV.fetch("DB_HOST") %>
  username: <%= ENV.fetch("DB_USERNAME") %>
  password: <%= ENV.fetch("DB_PASSWORD") %>
  pool:     <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") %>

